# ============================================================
# NexT Jekyll Theme Configuration
# ============================================================

# Site Settings
title: JoySnow
subtitle:
description: "Joy's personal blog"
author: JoySnow
language: en
timezone:
date_format: '%Y-%m-%d'
excerpt_separator: "<!--more-->"
excerpt_description: true
keywords: "Jekyll, NexT, blog, JoySnow"
index_with_subtitle: false

url: https://joysnow.github.io
baseurl: ""

permalink: /:title/

# Pagination
paginate: 10

# Markdown / Syntax Highlighting
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge
highlight_theme: normal

# Favicon
favicon: /assets/favicon.svg

# ============================================================
# NexT-Specific Settings
# ============================================================

# Menu (uncomment to show)
menu:
  home: /
  archives: /archives/
  tags: /tags/
  categories: /categories/

menu_icons:
  enable: true
  home: home
  archives: archive
  tags: tags
  categories: th

# Scheme: Muse | Mist | Pisces | Gemini
scheme: Mist

# Scroll / Reading
scroll_to_more: true
save_scroll: true

# Sidebar
sidebar:
  position: left
  display: always
  offset: 12
  b2t: true
  scrollpercent: true

# Table of Contents
toc:
  enable: true
  number: true
  wrap: false

avatar: https://avatars0.githubusercontent.com/u/13017832

# Social Links
social:
  GitHub: https://github.com/joysnow

social_icons:
  enable: true
  GitHub: github

# Post Meta
post_meta:
  item_text: true
  created_at: true
  updated_at: true
  categories: true

# Post Word Count
post_wordcount:
  item_text: true
  wordcount: true
  min2read: true

# Post Copyright
post_copyright:
  enable: true

# Creative Commons
creative_commons: by-nc-sa

# Comments
disqus:
  enable: false
  shortname:
  count: false
  hide: false

# Analytics
google_analytics:

# RSS / Feed
rss:

# Feed
feed:
  path: atom.xml

# Copyright
copyright: true
since: 2018

# Local Search
local_search:
  enable: false
  trigger: auto
  top_n_per_article: 1

# Animation
use_motion: true

# Fancybox (lightbox for images)
fancybox: false

# Plugins
plugins:
  - jemoji
  - jekyll-sitemap
  - jekyll-feed

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      comments: true

# Font
font:
  enable: true
  host:
  global:
    external: true
    family: Lato

# SEO
canonical: true
seo: true

# ============================================================
# Asset & Vendor Settings
# ============================================================

vendors:
  _internal: assets/lib

css: assets/css
js: assets/js
images: assets/images

# ============================================================
# Technical Settings
# ============================================================

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - CNAME
  - vendor
  - .gitignore

# ============================================================
# NexT Jekyll Theme Configuration
# ============================================================

# Site Settings
title: JoySnow
subtitle:
description:
author: JoySnow
language: en
timezone:

url: https://joysnow.github.io
baseurl: ""

permalink: /:title/

# Pagination
paginate: 10

# Markdown / Syntax Highlighting
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge
highlight_theme: normal

# ============================================================
# NexT-Specific Settings
# ============================================================

# Menu (uncomment to show)
menu:
  home: /
  archives: /archives/
  tags: /tags/
  categories: /categories/

menu_icons:
  enable: true

# Scheme: Muse | Mist | Pisces | Gemini
scheme: Muse

# Sidebar
sidebar:
  position: left
  display: post
  offset: 12
  b2t: false
  scrollpercent: false

avatar: https://avatars0.githubusercontent.com/u/13017832

# Social Links
social:
  GitHub: https://github.com/joysnow

social_icons:
  enable: true

# Post Meta
post_meta:
  item_text: true
  created_at: true
  updated_at: false
  categories: true

# Comments
disqus:
  enable: false
  shortname:
  count: false
  hide: false

# Analytics
google_analytics:

# RSS
rss:

# Copyright
copyright: true
since: 2018

# Local Search
local_search:
  enable: false
  trigger: auto
  top_n_per_article: 1

# SEO
canonical: true
seo: false

# ============================================================
# Asset & Vendor Settings
# ============================================================

vendors:
  _internal: assets/lib

css: assets/css
js: assets/js
images: assets/images

# ============================================================
# Technical Settings
# ============================================================

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - CNAME
  - vendor
  - .gitignore
